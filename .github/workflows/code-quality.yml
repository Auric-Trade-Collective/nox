# =============================================================================
# Nox - Code Quality & Security Workflow
# Tools: Semgrep OSS, golangci-lint, cpp-linter (clang-tidy), Reviewdog
# Triggers: Pull requests to main + push to main (for branch protection)
# =============================================================================

name: Code Quality & Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # golangci-lint - standalone check, appears as its own PR status
  # ---------------------------------------------------------------------------
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m
          only-new-issues: true

  # ---------------------------------------------------------------------------
  # clang-tidy - C static analysis via cpp-linter-action
  # ---------------------------------------------------------------------------
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        with:
          style: ''
          tidy-checks: '-*,bugprone-*,cert-*,clang-analyzer-*,portability-*'
          files-changed-only: false
          extra-args: '-I/usr/include/python3.12 -Iinclude -I.'
          ignore: 'changelog'

  # ---------------------------------------------------------------------------
  # Report - inline annotations via Reviewdog + sticky summary PR comment
  # ---------------------------------------------------------------------------
  report:
    name: PR Quality Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Install Reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      # Inline annotations in Checks tab and Files changed tab
      - name: golangci-lint annotations
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          golangci-lint run --timeout=5m --output.formats=line-number 2>&1 | \
          reviewdog -f=golangci-lint \
            -name="golangci-lint" \
            -reporter=github-check \
            -filter-mode=added \
            -level=warning \
            -fail-level=none || true

      # clang-tidy - posts its own native PR thread comment with all findings
      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: ''
          tidy-checks: '-*,bugprone-*,cert-*,clang-analyzer-*,portability-*'
          files-changed-only: true
          extra-args: '-I/usr/include/python3.12 -Iinclude -I.'
          ignore: 'test|old_noxpy.c'
          thread-comments: update
          file-annotations: true

      - name: Run Semgrep
        run: |
          semgrep \
            --config "p/golang" \
            --config "p/c" \
            --config "p/security-audit" \
            --config "p/secrets" \
            --sarif \
            --output semgrep.sarif || true

      - name: Semgrep annotations
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=sarif \
            -name="semgrep" \
            -reporter=github-check \
            -filter-mode=added \
            -level=warning \
            -fail-level=none \
            < semgrep.sarif || true

      # Capture golangci-lint output for summary comment
      - name: Capture golangci-lint output
        id: golangci
        run: |
          OUTPUT=$(golangci-lint run --timeout=5m 2>&1 || true)
          if [ -z "$OUTPUT" ]; then
            OUTPUT="✅ No issues found."
          fi
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # Parse Semgrep SARIF into a readable list with full messages
      - name: Parse Semgrep output
        id: semgrep
        env:
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          OUTPUT=$(python3 << 'PYEOF'
          import json, os

          sha = os.environ.get('SHA', '')
          repo = os.environ.get('REPO', '')
          base_url = f"https://github.com/{repo}/blob/{sha}"

          try:
            with open('semgrep.sarif') as f:
              data = json.load(f)
            findings = []
            for run in data.get('runs', []):
              for r in run.get('results', []):
                msg = r.get('message', {}).get('text', '').strip()
                rule = r.get('ruleId', 'unknown')
                sev = r.get('level', 'warning').upper()
                for loc in r.get('locations', []):
                  uri = loc.get('physicalLocation', {}).get('artifactLocation', {}).get('uri', '')
                  line = loc.get('physicalLocation', {}).get('region', {}).get('startLine', 1)
                  link = f"[{uri}:{line}]({base_url}/{uri}#L{line})"
                  findings.append((sev, link, rule, msg))
            if findings:
              for sev, link, rule, msg in findings:
                print(f"**{sev}** {link} `{rule}`")
                print(f"> {msg}")
                print("")
            else:
              print("✅ No issues found.")
          except Exception as e:
            print(f"Error parsing semgrep output: {e}")
          PYEOF
          )
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # Sticky PR comment — updates on every push, never duplicates
      # (clang-tidy posts its own separate comment via thread-comments: update)
      - name: Post summary comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-quality
          message: |
            ## 🔍 Code Quality Report

            > 💡 Inline annotations are also visible in the **Checks** tab and **Files changed** tab.

            <details open>
            <summary><b>🔧 golangci-lint</b></summary>

            ```
            ${{ steps.golangci.outputs.result }}
            ```

            </details>

            <details open>
            <summary><b>🔎 Semgrep</b></summary>

            ${{ steps.semgrep.outputs.result }}

            </details>

            ---
