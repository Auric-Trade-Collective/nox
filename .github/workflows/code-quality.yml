# =============================================================================
# Nox - Code Quality & Security Workflow
# Tools: Semgrep OSS, golangci-lint, Reviewdog, Horusec CLI
# Triggers: Pull requests to main
# =============================================================================

name: Code Quality & Security

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # golangci-lint - standalone check so it appears as its own PR status
  # ---------------------------------------------------------------------------
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m
          only-new-issues: true

  # ---------------------------------------------------------------------------
  # Report - inline annotations via reviewdog + sticky summary PR comment
  # ---------------------------------------------------------------------------
  report:
    name: PR Quality Report
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Install Reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      # Inline annotations in Files Changed tab via github-check
      - name: golangci-lint inline annotations
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          golangci-lint run --timeout=5m --output.formats=line-number 2>&1 | \
          reviewdog -f=golangci-lint \
            -name="golangci-lint" \
            -reporter=github-check \
            -filter-mode=added \
            -level=warning \
            -fail-level=none || true

      - name: Run Semgrep and save SARIF
        run: |
          semgrep \
            --config "p/golang" \
            --config "p/c" \
            --config "p/security-audit" \
            --config "p/secrets" \
            --sarif \
            --output semgrep.sarif || true

      - name: Semgrep inline annotations
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=sarif \
            -name="semgrep" \
            -reporter=github-check \
            -filter-mode=added \
            -level=warning \
            -fail-level=none \
            < semgrep.sarif || true

      # Capture golangci-lint output for summary comment
      - name: Capture golangci-lint output
        id: golangci
        run: |
          OUTPUT=$(golangci-lint run --timeout=5m 2>&1 || true)
          if [ -z "$OUTPUT" ]; then
            OUTPUT="✅ No issues found."
          fi
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # Parse Semgrep SARIF into a markdown table with GitHub file links
      - name: Parse Semgrep for summary
        id: semgrep
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"

          OUTPUT=$(python3 << 'PYEOF'
          import json, os

          sha = os.environ.get('SHA', '')
          repo = os.environ.get('REPO', '')
          base_url = f"https://github.com/{repo}/blob/{sha}"

          try:
            with open('semgrep.sarif') as f:
              data = json.load(f)
            rows = []
            for run in data.get('runs', []):
              for r in run.get('results', []):
                msg = r.get('message', {}).get('text', '').split('\n')[0][:100]
                rule = r.get('ruleId', 'unknown')
                sev = r.get('level', 'warning').upper()
                for loc in r.get('locations', []):
                  uri = loc.get('physicalLocation', {}).get('artifactLocation', {}).get('uri', '')
                  line = loc.get('physicalLocation', {}).get('region', {}).get('startLine', 1)
                  link = f"[{uri}:{line}]({base_url}/{uri}#L{line})"
                  rows.append(f"| {sev} | {link} | `{rule}` | {msg} |")
            if rows:
              print("| Severity | Location | Rule | Message |")
              print("|----------|----------|------|---------|")
              for row in rows:
                print(row)
            else:
              print("✅ No issues found.")
          except Exception as e:
            print(f"Error parsing semgrep output: {e}")
          PYEOF
          )

          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT
        env:
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}

      # Sticky summary comment — updates on every push, never duplicates
      - name: Post sticky summary comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-quality
          message: |
            ## 🔍 Code Quality Report

            > 💡 Inline annotations are also visible in the **Checks** tab and **Files changed** tab.

            <details open>
            <summary><b>🔧 golangci-lint</b></summary>

            ```
            ${{ steps.golangci.outputs.result }}
            ```

            </details>

            <details open>
            <summary><b>🔎 Semgrep</b></summary>

            ${{ steps.semgrep.outputs.result }}

            </details>

            ---
            *Updated on every push · [Horusec Dashboard](https://horusec.aurictradecollective.org)*

  # ---------------------------------------------------------------------------
  # Horusec - SAST with Docker, sends results to self-hosted dashboard
  # Note: uses direct IP:port to bypass nginx path rewriting
  # ---------------------------------------------------------------------------
  horusec:
    name: Horusec Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Horusec
        run: |
          curl -fsSL https://raw.githubusercontent.com/ZupIT/horusec/main/deployments/scripts/install.sh | bash -s latest
          docker info  # verify docker is available
          horusec start \
            -p ./ \
            -P ./ \
            -a "${{ secrets.HORUSEC_API_TOKEN }}" \
            -u "http://135.125.254.33:8000" \
            --log-level=info \
            -o json \
            -O /tmp/horusec-report.json \
            || true

      - name: Upload Horusec Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: horusec-report
          path: /tmp/horusec-report.json
          if-no-files-found: warn
