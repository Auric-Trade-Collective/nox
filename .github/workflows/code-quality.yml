# =============================================================================
# Nox - Code Quality & Security Workflow
# Tools: Semgrep OSS, golangci-lint, cpp-linter (clang-tidy), Reviewdog
# Triggers: Pull requests to main + push to main (for branch protection)
#
# Design: Each linter runs ONCE in its own job (so it shows as a PR status
# check). Output is uploaded as an artifact. The `report` job downloads the
# artifacts and posts inline annotations + a sticky summary comment.
# =============================================================================

name: Code Quality & Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # golangci-lint - runs once, uploads output for the report job
  # ---------------------------------------------------------------------------
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      # Run once, capture output in both formats we need.
      # `tee` keeps the output visible in the job log while also saving to files.
      - name: Run golangci-lint
        id: run
        run: |
          set +e
          golangci-lint run --timeout=5m --output.formats=line-number 2>&1 | tee golangci-lint.line-number.txt
          EXIT=${PIPESTATUS[0]}
          # Also produce a human-readable copy for the summary comment
          cp golangci-lint.line-number.txt golangci-lint.txt
          if [ ! -s golangci-lint.txt ]; then
            echo "✅ No issues found." > golangci-lint.txt
          fi
          exit $EXIT

      - name: Upload golangci-lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golangci-lint-output
          path: |
            golangci-lint.line-number.txt
            golangci-lint.txt
          retention-days: 1

  # ---------------------------------------------------------------------------
  # clang-tidy - runs once, uploads SARIF for the report job
  # ---------------------------------------------------------------------------
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-22.04
    steps:
      - name: Update apt cache
        run: sudo apt-get update
      - uses: actions/checkout@v4

      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: ''
          tidy-checks: '-*,bugprone-*,cert-*,clang-analyzer-*,portability-*'
          files-changed-only: false
          extra-args: '-I/usr/include/python3.12 -Iinclude -I.'
          ignore: 'test|old_noxpy.c|changelog'
          # Let this job post the inline file annotations + PR thread comment
          # directly, so the report job doesn't need to re-run clang-tidy.
          thread-comments: ${{ github.event_name == 'pull_request' && 'update' || false }}
          file-annotations: true

  # ---------------------------------------------------------------------------
  # Semgrep - runs once, uploads SARIF for the report job
  # ---------------------------------------------------------------------------
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep \
            --config "p/golang" \
            --config "p/c" \
            --config "p/security-audit" \
            --config "p/secrets" \
            --sarif \
            --output semgrep.sarif || true

      - name: Upload Semgrep SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-output
          path: semgrep.sarif
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Report - consumes artifacts from the linter jobs, posts annotations +
  # sticky PR summary comment. Does NOT re-run any linter.
  # ---------------------------------------------------------------------------
  report:
    name: PR Quality Report
    runs-on: ubuntu-latest
    needs: [golangci-lint, clang-tidy, semgrep]
    # Run even if upstream jobs "failed" (i.e. found issues) — we still want the report.
    if: ${{ github.event_name == 'pull_request' && always() }}
    permissions:
      pull-requests: write
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download golangci-lint output
        uses: actions/download-artifact@v4
        with:
          name: golangci-lint-output
          path: artifacts/golangci-lint

      - name: Download Semgrep SARIF
        uses: actions/download-artifact@v4
        with:
          name: semgrep-output
          path: artifacts/semgrep

      - name: Install Reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      # Inline annotations from the already-computed golangci-lint output
      - name: golangci-lint annotations
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=golangci-lint \
            -name="golangci-lint" \
            -reporter=github-check \
            -filter-mode=added \
            -level=warning \
            -fail-level=none \
            < artifacts/golangci-lint/golangci-lint.line-number.txt || true

      # Inline annotations from the already-computed Semgrep SARIF
      - name: Semgrep annotations
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=sarif \
            -name="semgrep" \
            -reporter=github-check \
            -filter-mode=added \
            -level=warning \
            -fail-level=none \
            < artifacts/semgrep/semgrep.sarif || true

      # Read golangci-lint output for summary comment
      - name: Read golangci-lint output
        id: golangci
        run: |
          OUTPUT=$(cat artifacts/golangci-lint/golangci-lint.txt)
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # Parse Semgrep SARIF into a readable list with full messages
      - name: Parse Semgrep output
        id: semgrep
        env:
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          OUTPUT=$(python3 << 'PYEOF'
          import json, os

          sha = os.environ.get('SHA', '')
          repo = os.environ.get('REPO', '')
          base_url = f"https://github.com/{repo}/blob/{sha}"

          try:
            with open('artifacts/semgrep/semgrep.sarif') as f:
              data = json.load(f)
            findings = []
            for run in data.get('runs', []):
              for r in run.get('results', []):
                msg = r.get('message', {}).get('text', '').strip()
                rule = r.get('ruleId', 'unknown')
                sev = r.get('level', 'warning').upper()
                for loc in r.get('locations', []):
                  uri = loc.get('physicalLocation', {}).get('artifactLocation', {}).get('uri', '')
                  line = loc.get('physicalLocation', {}).get('region', {}).get('startLine', 1)
                  link = f"[{uri}:{line}]({base_url}/{uri}#L{line})"
                  findings.append((sev, link, rule, msg))
            if findings:
              for sev, link, rule, msg in findings:
                print(f"**{sev}** {link} `{rule}`")
                print(f"> {msg}")
                print("")
            else:
              print("✅ No issues found.")
          except Exception as e:
            print(f"Error parsing semgrep output: {e}")
          PYEOF
          )
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # Sticky PR comment — updates on every push, never duplicates.
      # clang-tidy posts its own thread comment from its own job.
      - name: Post summary comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-quality
          message: |
            ## 🔍 Code Quality Report

            > 💡 Inline annotations are also visible in the **Checks** tab and **Files changed** tab.
            > clang-tidy findings appear in a separate PR comment below.

            <details open>
            <summary><b>🔧 golangci-lint</b></summary>

            ```
            ${{ steps.golangci.outputs.result }}
            ```

            </details>

            <details open>
            <summary><b>🔎 Semgrep</b></summary>

            ${{ steps.semgrep.outputs.result }}

            </details>

            ---
