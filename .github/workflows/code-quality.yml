# =============================================================================
# Nox - Code Quality & Security Workflow
# Tools: Semgrep OSS, golangci-lint, Horusec CLI
# Results posted as a single sticky PR comment via marocchino/sticky-pull-request-comment
# Triggers: Pull requests to main
# =============================================================================

name: Code Quality & Security

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # golangci-lint - Go linting
  # Runs separately so it can fail the check independently
  # ---------------------------------------------------------------------------
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m
          only-new-issues: true
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Report - runs all tools, collects output, posts a single sticky PR comment
  # ---------------------------------------------------------------------------
  report:
    name: PR Quality Report
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # --- golangci-lint ---
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      - name: Run golangci-lint
        id: golangci
        run: |
          OUTPUT=$(golangci-lint run --timeout=5m --output.formats=line-number 2>&1 || true)
          if [ -z "$OUTPUT" ]; then
            OUTPUT="✅ No issues found."
          fi
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # --- Semgrep ---
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        id: semgrep
        run: |
          semgrep \
            --config "p/golang" \
            --config "p/c" \
            --config "p/security-audit" \
            --config "p/secrets" \
            --sarif \
            --output semgrep.sarif || true

          OUTPUT=$(python3 -c "
          import json, sys
          try:
            with open('semgrep.sarif') as f:
              data = json.load(f)
            results = []
            for run in data.get('runs', []):
              for r in run.get('results', []):
                msg = r.get('message', {}).get('text', '').split('\n')[0]
                rule = r.get('ruleId', 'unknown')
                for loc in r.get('locations', []):
                  uri = loc.get('physicalLocation', {}).get('artifactLocation', {}).get('uri', '')
                  line = loc.get('physicalLocation', {}).get('region', {}).get('startLine', '?')
                  results.append(f'{uri}:{line} [{rule}] {msg}')
            if results:
              print('\n'.join(results))
            else:
              print('✅ No issues found.')
          except Exception as e:
            print(f'Error parsing semgrep output: {e}')
          " 2>/dev/null || echo "✅ No issues found.")

          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # --- Post sticky PR comment ---
      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-quality
          message: |
            ## 🔍 Code Quality Report

            <details>
            <summary><b>golangci-lint</b></summary>

            ```
            ${{ steps.golangci.outputs.result }}
            ```

            </details>

            <details>
            <summary><b>Semgrep</b></summary>

            ```
            ${{ steps.semgrep.outputs.result }}
            ```

            </details>

            ---
            *Updated on every push. Full security report in [Horusec dashboard](https://horusec.aurictradecollective.org).*

  # ---------------------------------------------------------------------------
  # Horusec - security scan, posts results to your self-hosted dashboard
  # ---------------------------------------------------------------------------
  horusec:
    name: Horusec Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Horusec
        run: |
          curl -fsSL https://raw.githubusercontent.com/ZupIT/horusec/main/deployments/scripts/install.sh | bash -s latest
          horusec start \
            -p ./ \
            -a "${{ secrets.HORUSEC_API_TOKEN }}" \
            -u "https://horusec.aurictradecollective.org" \
            --log-level=info \
            --disable-docker=true \
            -o json \
            -O /tmp/horusec-report.json \
            || true

      - name: Upload Horusec Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: horusec-report
          path: /tmp/horusec-report.json
          if-no-files-found: warn
